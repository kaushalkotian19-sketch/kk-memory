<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Memories</title>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }
header { background:#ff5e78; color:white; text-align:center; padding:15px; }
.container { padding:15px; }

button {
    padding:10px;
    margin:5px 0;
    border:none;
    background:#ff5e78;
    color:white;
    border-radius:8px;
}

.album {
    background:white;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.gallery img {
    width:100px;
    height:100px;
    object-fit:cover;
    margin:5px;
    border-radius:8px;
}
</style>
</head>

<body>

<header>
    <h2>📸 My Memories</h2>
</header>

<div class="container">

    <input type="text" id="albumName" placeholder="Enter Album Name">
    <button onclick="createAlbum()">Create Album</button>

    <br><br>

    <input type="file" id="photoInput">
    <button onclick="uploadPhoto()">Upload Photo</button>

    <div id="albums"></div>

</div>

<script>
let albums = JSON.parse(localStorage.getItem("albums")) || {};

function saveData(){
    localStorage.setItem("albums", JSON.stringify(albums));
}

function createAlbum(){
    let name = document.getElementById("albumName").value;
    if(!name) return alert("Enter album name");

    if(!albums[name]) albums[name] = [];

    saveData();
    displayAlbums();
}

function uploadPhoto(){
    let file = document.getElementById("photoInput").files[0];
    if(!file) return alert("Select photo");

    let reader = new FileReader();
    reader.onload = function(e){
        let album = prompt("Enter album name to save photo:");

        if(!albums[album]) albums[album] = [];

        albums[album].push(e.target.result);
        saveData();
        displayAlbums();
    }
    reader.readAsDataURL(file);
}

function displayAlbums(){
    let container = document.getElementById("albums");
    container.innerHTML = "";

    for(let name in albums){
        let div = document.createElement("div");
        div.className = "album";

        let html = `<h3>${name}</h3><div class="gallery">`;

        albums[name].forEach(img=>{
            html += `<img src="${img}">`;
        });

        html += `</div>`;
        div.innerHTML = html;

        container.appendChild(div);
    }
}

displayAlbums();
</script>

</body>
</html>
