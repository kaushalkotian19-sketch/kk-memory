<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Memories | Personal Vault</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #ff00cc;
            --secondary: #3333ff;
            --bg: #050010;
            --card-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            padding-bottom: env(safe-area-inset-bottom, 50px);
            line-height: 1.5;
        }

        /* Glassmorphism Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 0, 16, 0.8);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 1px solid var(--glass-border);
        }

        h1 { 
            text-align: center; 
            margin: 0; 
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container { width: 92%; margin: 0 auto; max-width: 600px; padding-top: 20px; }
        
        input {
            width: 100%;
            margin: 8px 0;
            padding: 14px;
            box-sizing: border-box;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: var(--card-bg);
            color: white;
            transition: all 0.3s ease;
            font-size: 16px;
        }

        input:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.1); }

        .upload-area {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            margin-bottom: 25px;
        }

        button {
            width: 100%;
            margin: 10px 0;
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.5; cursor: wait; }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px 0;
        }

        .album-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 12px;
            transition: 0.3s;
        }

        .thumb-container {
            width: 100%;
            aspect-ratio: 1/1;
            background: #111;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .album-card h3 { margin: 0; font-size: 0.95rem; }
        .album-card p { margin: 4px 0 0; font-size: 0.8rem; color: var(--text-dim); }

        .action-btns { display: flex; gap: 8px; margin-top: 12px; }
        .action-btns button { padding: 10px; margin: 0; font-size: 0.85rem; background: rgba(255,255,255,0.05); }

        .photo-item { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 1/1; border: 1px solid var(--glass-border); }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .del-btn {
            position: absolute; top: 8px; right: 8px;
            background: rgba(255,50,50,0.9); width: 28px; height: 28px; 
            padding: 0; border-radius: 50%; border: none; color: white;
        }

        #lockScreen {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>

<body>

<div id="lockScreen">
    <div style="font-size: 3rem; margin-bottom: 20px;">🔐</div>
    <h2 style="font-weight: 400; margin-bottom: 30px;">Personal Vault</h2>
    <div style="width: 85%; max-width: 320px;">
        <input id="pass" type="password" placeholder="Enter PIN" style="text-align: center; letter-spacing: 4px;">
        <button onclick="unlock()">Access Gallery</button>
    </div>
</div>

<div class="header">
    <h1>📸 MY MEMORIES</h1>
</div>

<div class="container">
    <input id="search" placeholder="🔍 Search folders or photos..." oninput="display()">
    
    <div class="upload-area">
        <input id="albumName" placeholder="Album Name (Optional)">
        <input type="file" id="fileInput" multiple style="border: 2px dashed var(--glass-border); padding: 15px; margin: 15px 0;">
        <button id="uploadBtn" onclick="upload(this)">Cloud Upload</button>
    </div>

    <div id="albums"></div>
</div>

<script>
    const PASSWORD = "1234";
    const CLOUD_NAME = "dzfssbg4j";
    const UPLOAD_PRESET = "memories_upload";

    let albums = JSON.parse(localStorage.getItem("albums")) || {};

    function save() {
        localStorage.setItem("albums", JSON.stringify(albums));
    }

    function unlock() {
        if (document.getElementById("pass").value === PASSWORD) {
            document.getElementById("lockScreen").style.display = "none";
            display();
        } else {
            alert("Wrong PIN");
        }
    }

    function detectAI(name) {
        name = name.toLowerCase();
        if (/cake|birthday|party/.test(name)) return "🎂 Birthday";
        if (/beach|trip|travel|vacation/.test(name)) return "✈️ Travel";
        if (/fam|mom|dad|sister|brother/.test(name)) return "👨‍👩‍👧 Family";
        return "📦 General";
    }

    async function upload(btn) {
        const files = document.getElementById("fileInput").files;
        if (files.length === 0) return alert("Select photos first");

        const originalText = btn.innerText;
        btn.innerText = "🚀 Uploading...";
        btn.disabled = true;

        for (let file of files) {
            let formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);

            try {
                let res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, {
                    method: "POST",
                    body: formData
                });
                
                if (!res.ok) throw new Error('Network response was not ok');
                let data = await res.json();
                
                // SAFER URL LOGIC: Only transform if it's a standard Cloudinary upload URL
                let rawUrl = data.secure_url;
                let thumbUrl = rawUrl;
                let fullUrl = rawUrl;

                if (rawUrl.includes('/upload/')) {
                    thumbUrl = rawUrl.replace('/upload/', '/upload/w_400,h_400,c_fill,g_auto,q_auto,f_auto/');
                    fullUrl = rawUrl.replace('/upload/', '/upload/q_auto,f_auto/');
                }

                let manual = document.getElementById("albumName").value;
                let albumKey = manual ? manual : detectAI(file.name);

                if (!albums[albumKey]) albums[albumKey] = { items: [] };
                albums[albumKey].items.unshift({ url: fullUrl, thumb: thumbUrl, name: file.name });
            } catch (e) {
                console.error("Cloudinary Error:", e);
                alert("Upload failed for: " + file.name);
            }
        }

        save();
        display();
        btn.innerText = originalText;
        btn.disabled = false;
        document.getElementById("fileInput").value = "";
        document.getElementById("albumName").value = "";
    }

    function display() {
        let div = document.getElementById("albums");
        let search = document.getElementById("search").value.toLowerCase();
        let html = '<div class="grid">';

        const keys = Object.keys(albums);
        if (keys.length === 0) {
            html = '<p style="text-align:center; color:#666; margin-top:40px;">No albums yet.</p>';
        } else {
            for (let name in albums) {
                let items = albums[name].items;
                let match = name.toLowerCase().includes(search) || 
                            items.some(i => i.name.toLowerCase().includes(search));

                if (!match) continue;

                let cover = items[0];
                html += `
                    <div class="album-card">
                        <div onclick="openAlbum('${name}')">
                            <div class="thumb-container">
                                ${cover ? `<img src="${cover.thumb}" loading="lazy" onerror="this.src='https://placehold.co/400x400/111/white?text=Error'">` : `📁`}
                            </div>
                            <h3>${name}</h3>
                            <p>${items.length} photos</p>
                        </div>
                        <div class="action-btns">
                            <button onclick="renameAlbum('${name}')">✏️</button>
                            <button onclick="deleteAlbum('${name}')">🗑️</button>
                        </div>
                    </div>`;
            }
            html += '</div>';
        }
        div.innerHTML = html;
    }

    function openAlbum(name) {
        let div = document.getElementById("albums");
        let html = `
            <div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <button onclick="display()" style="width:auto; padding:10px 20px; background:rgba(255,255,255,0.1)">Back</button>
                    <h2 style="margin:0; font-size:1.2rem;">${name}</h2>
                </div>
                <div class="grid" style="padding:0;">`;

        albums[name].items.forEach((item, i) => {
            html += `
                <div class="photo-item">
                    <img src="${item.thumb}" onclick="window.open('${item.url}', '_blank')" onerror="this.src='https://placehold.co/400x400/111/white?text=Broken'">
                    <button class="del-btn" onclick="deleteItem('${name}',${i})">×</button>
                </div>`;
        });

        html += `</div></div>`;
        div.innerHTML = html;
    }

    function deleteItem(name, i) {
        if(confirm("Delete this photo?")) {
            albums[name].items.splice(i, 1);
            if (albums[name].items.length === 0) delete albums[name];
            save();
            albums[name] ? openAlbum(name) : display();
        }
    }

    function deleteAlbum(name) {
        if (confirm(`Delete entire album "${name}"?`)) {
            delete albums[name];
            save();
            display();
        }
    }

    function renameAlbum(name) {
        let n = prompt("New name:", name);
        if (n && n !== name) {
            albums[n] = albums[name];
            delete albums[name];
            save();
            display();
        }
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
