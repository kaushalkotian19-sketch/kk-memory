<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Memories</title>

<style>
body {margin:0;font-family:sans-serif;background:#0a001a;color:white;}
h1{text-align:center;}

input,button{
width:90%;margin:8px auto;display:block;padding:10px;border-radius:10px;border:none;
}

button{background:linear-gradient(90deg,#ff00cc,#3333ff);color:white;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.album{
background:#111;
padding:10px;
border-radius:10px;
text-align:center;
}

img{width:100%;border-radius:10px;}
</style>
</head>

<body>

<!-- LOCK -->
<div id="lockScreen" style="position:fixed;width:100%;height:100%;background:black;display:flex;flex-direction:column;justify-content:center;align-items:center;">
<h2>🔐 Enter Password</h2>
<input id="pass" type="password">
<button onclick="unlock()">Unlock</button>
</div>

<h1>📸 My Memories</h1>

<input id="albumName" placeholder="Album name">
<button onclick="createAlbum()">Create Album</button>

<input type="file" id="fileInput" multiple>
<button onclick="upload()">Upload</button>

<div id="albums"></div>

<script>
let PASSWORD="1234";

let albums = JSON.parse(localStorage.getItem("albums")) || {};

function save(){
localStorage.setItem("albums", JSON.stringify(albums));
}

/* FIX OLD DATA */
function fixData(){
for(let a in albums){
if(!albums[a].items){
albums[a]={items:albums[a]};
}
}
save();
}
fixData();

/* LOCK */
function unlock(){
if(document.getElementById("pass").value===PASSWORD){
document.getElementById("lockScreen").style.display="none";
display();
}else{
alert("Wrong password");
}
}

/* CREATE */
function createAlbum(){
let name=document.getElementById("albumName").value;
if(!name) return;

if(!albums[name]){
albums[name]={items:[]};
save();
display();
}
}

/* UPLOAD */
async function upload(){
let files=document.getElementById("fileInput").files;
if(files.length===0) return;

let name=document.getElementById("albumName").value || "Default";

if(!albums[name]) albums[name]={items:[]};

for(let f of files){
let url=URL.createObjectURL(f); // TEMP (works always)
albums[name].items.push({url});
}

save();
display();
}

/* DISPLAY */
function display(){
let div=document.getElementById("albums");

let html='<div class="grid">';

for(let name in albums){
let first=albums[name].items[0];

html+=`
<div class="album">
<div onclick="openAlbum('${name}')">
${first?`<img src="${first.url}">`:"No Image"}
<h3>${name}</h3>
<p>${albums[name].items.length} items</p>
</div>

<button onclick="renameAlbum('${name}')">✏️</button>
<button onclick="deleteAlbum('${name}')">🗑️</button>
</div>
`;
}

html+='</div>';
div.innerHTML=html;
}

/* OPEN */
function openAlbum(name){
let div=document.getElementById("albums");

let html=`<button onclick="display()">⬅ Back</button><h2>${name}</h2>`;

albums[name].items.forEach((item,i)=>{
html+=`<img src="${item.url}">`;
html+=`<button onclick="deleteItem('${name}',${i})">Delete</button>`;
});

div.innerHTML=html;
}

/* DELETE */
function deleteItem(name,i){
albums[name].items.splice(i,1);
save();
openAlbum(name);
}

/* DELETE ALBUM */
function deleteAlbum(name){
if(confirm("Delete album?")){
delete albums[name];
save();
display();
}
}

/* RENAME */
function renameAlbum(name){
let newName=prompt("New name");
if(newName){
albums[newName]=albums[name];
delete albums[name];
save();
display();
}
}
</script>

</body>
</html>
