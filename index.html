<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Memories</title>

<link rel="manifest" href="manifest.json">

<style>
body {margin:0;font-family:sans-serif;background:#0a001a;color:white;}
h1{text-align:center;}

input,button{
width:90%;margin:8px auto;display:block;padding:10px;border-radius:10px;border:none;
}

button{background:linear-gradient(90deg,#ff00cc,#3333ff);color:white;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.album{
background:#111;
padding:10px;
border-radius:10px;
text-align:center;
}

img{width:100%;border-radius:10px;}
</style>

</head>

<body>

<!-- LOCK -->
<div id="lockScreen" style="position:fixed;width:100%;height:100%;background:black;display:flex;flex-direction:column;justify-content:center;align-items:center;">
<h2>🔐 Enter Password</h2>
<input id="pass" type="password">
<button onclick="unlock()">Unlock</button>
</div>

<h1>📸 My Memories</h1>

<input id="search" placeholder="Search photos or albums..." oninput="display()">

<input id="albumName" placeholder="Album name (optional AI)">
<button onclick="createAlbum()">Create Album</button>

<input type="file" id="fileInput" multiple>
<button onclick="upload(this)">Upload</button>

<div id="albums"></div>

<script>
let PASSWORD="1234";

let CLOUD_NAME="dzfssbg4j";
let UPLOAD_PRESET="memories_upload";

let albums=JSON.parse(localStorage.getItem("albums"))||{};

function save(){
localStorage.setItem("albums",JSON.stringify(albums));
}

/* AI DETECT */
function detectAI(name){
name=name.toLowerCase();

if(name.includes("cake")||name.includes("birthday")) return "🎂 Birthday";
if(name.includes("travel")||name.includes("trip")||name.includes("beach")) return "✈️ Travel";
if(name.includes("family")||name.includes("mom")||name.includes("dad")) return "👨‍👩‍👧 Family";

return "📦 Others";
}

/* LOCK */
function unlock(){
if(document.getElementById("pass").value===PASSWORD){
document.getElementById("lockScreen").style.display="none";
display();
}else{
alert("Wrong password");
}
}

/* CREATE */
function createAlbum(){
let name=document.getElementById("albumName").value;
if(!name) return;

if(!albums[name]){
albums[name]={items:[]};
save();
display();
}
}

/* UPLOAD CLOUDINARY */
async function upload(btn){
let files=document.getElementById("fileInput").files;
if(files.length===0) return;

btn.innerText="Uploading...";
btn.disabled=true;

for(let file of files){

let formData=new FormData();
formData.append("file",file);
formData.append("upload_preset",UPLOAD_PRESET);

let res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`,{
method:"POST",
body:formData
});

let data=await res.json();

let manual=document.getElementById("albumName").value;
let album=manual?manual:detectAI(file.name);

if(!albums[album]) albums[album]={items:[]};

albums[album].items.push({
url:data.secure_url,
name:file.name
});
}

save();
display();

btn.innerText="Upload";
btn.disabled=false;
}

/* DISPLAY */
function display(){
let div=document.getElementById("albums");
let search=document.getElementById("search").value.toLowerCase();

let html='<div class="grid">';

for(let name in albums){

let items=albums[name].items;

let match=name.toLowerCase().includes(search) ||
items.some(i=>i.name.toLowerCase().includes(search));

if(!match) continue;

let first=items[0];

html+=`
<div class="album">
<div onclick="openAlbum('${name}')">
${first?`<img src="${first.url}">`:"No Image"}
<h3>${name}</h3>
<p>${items.length} items</p>
</div>

<button onclick="renameAlbum('${name}')">✏️</button>
<button onclick="deleteAlbum('${name}')">🗑️</button>
</div>
`;
}

html+='</div>';
div.innerHTML=html;
}

/* OPEN */
function openAlbum(name){
let div=document.getElementById("albums");

let html=`<button onclick="display()">⬅ Back</button><h2>${name}</h2>`;

albums[name].items.forEach((item,i)=>{
html+=`<img src="${item.url}">`;
html+=`<button onclick="deleteItem('${name}',${i})">Delete</button>`;
});

div.innerHTML=html;
}

/* DELETE ITEM */
function deleteItem(name,i){
albums[name].items.splice(i,1);
save();
openAlbum(name);
}

/* DELETE ALBUM */
function deleteAlbum(name){
if(confirm("Delete album?")){
delete albums[name];
save();
display();
}
}

/* RENAME */
function renameAlbum(name){
let newName=prompt("New name");
if(newName){
albums[newName]=albums[name];
delete albums[name];
save();
display();
}
}
</script>

</body>
</html>
