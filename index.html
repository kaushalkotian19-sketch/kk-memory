<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Memory Vault</title>

<style>
:root {
    --primary: #ff00cc;
    --secondary: #3333ff;
    --bg-color: #050010;
    --accent-glow: rgba(188, 19, 254, 0.2);
    --card-bg: rgba(255, 255, 255, 0.06);
    --glass-border: rgba(255, 255, 255, 0.12);
    --text-main: #ffffff;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-color);
    background-image: radial-gradient(circle at top right, var(--accent-glow), transparent 70%);
    background-attachment: fixed;
    transition: background 1.5s ease-in-out;
    color: var(--text-main);
}

.header {
    position: sticky;
    top: 0;
    background: rgba(5,0,16,0.8);
    padding: 15px;
    text-align: center;
}

.container {
    width: 92%;
    margin: auto;
    padding-top: 10px;
}

input, button {
    width: 100%;
    margin: 8px 0;
    padding: 12px;
    border-radius: 10px;
    border: none;
}

button {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 10px;
}

.album-card {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 10px;
    text-align: center;
}

.thumb-container {
    aspect-ratio: 1;
    overflow: hidden;
}

.thumb-container img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

#lockScreen {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}
</style>
</head>

<body>

<div id="lockScreen">
<h2>🔐</h2>
<input id="pass" type="password">
<button onclick="unlock()">Unlock</button>
</div>

<div class="header"><h1>📸 AI VAULT</h1></div>

<div class="container">
<input id="search" placeholder="Search..." oninput="display()">
<input id="albumName" placeholder="Album name">

<input type="file" id="fileInput" multiple>
<button onclick="upload(this)">Upload</button>

<div id="albums"></div>
</div>

<script>
const PASSWORD="1234";
const CLOUD_NAME="dzfssbg4j";
const UPLOAD_PRESET="memories_upload";

let albums=JSON.parse(localStorage.getItem("albums"))||{};

function save(){
localStorage.setItem("albums",JSON.stringify(albums));
}

/* 🌅 TIME THEME */
function applyTimeTheme(){
let h=new Date().getHours();
let root=document.documentElement.style;

if(h>=6 && h<11){
root.setProperty('--bg-color','#1a0b2e');
root.setProperty('--accent-glow','rgba(255,140,180,0.3)');
}
else if(h>=11 && h<17){
root.setProperty('--bg-color','#001529');
root.setProperty('--accent-glow','rgba(0,210,255,0.3)');
}
else{
root.setProperty('--bg-color','#050010');
root.setProperty('--accent-glow','rgba(188,19,254,0.2)');
}
}

/* 🎨 VIBRANT */
function extractVibrantColor(url){
document.documentElement.style.setProperty('--accent-glow','rgba(255,255,255,0.15)');
}

/* LOCK */
function unlock(){
if(document.getElementById("pass").value===PASSWORD){
document.getElementById("lockScreen").style.display="none";
applyTimeTheme();
display();
}else alert("Wrong password");
}

/* UPLOAD */
async function upload(btn){
let files=document.getElementById("fileInput").files;
if(files.length===0) return;

btn.innerText="Uploading...";
btn.disabled=true;

for(let f of files){
let fd=new FormData();
fd.append("file",f);
fd.append("upload_preset",UPLOAD_PRESET);

let res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`,{
method:"POST",
body:fd
});

let data=await res.json();

let album=document.getElementById("albumName").value || "General";

if(!albums[album]) albums[album]={items:[]};

albums[album].items.unshift({
url:data.secure_url
});
}

save();
display();

btn.innerText="Upload";
btn.disabled=false;
}

/* DISPLAY */
function display(){
applyTimeTheme();

let div=document.getElementById("albums");
let search=document.getElementById("search").value.toLowerCase();

let html='<div class="grid">';

for(let name in albums){

if(search && !name.toLowerCase().includes(search)) continue;

let first=albums[name].items[0];

html+=`
<div class="album-card" onclick="openAlbum('${name}')">
<div class="thumb-container">
${first?`<img src="${first.url}">`:"No Image"}
</div>
<h3>${name}</h3>
<p>${albums[name].items.length} items</p>
</div>
`;
}

html+='</div>';
div.innerHTML=html;
}

/* OPEN */
function openAlbum(name){
let first=albums[name].items[0]?.url;
extractVibrantColor(first);

let div=document.getElementById("albums");

let html=`<button onclick="display()">⬅ Back</button><h2>${name}</h2>`;

albums[name].items.forEach(item=>{
html+=`<img src="${item.url}" style="width:100%;margin-top:10px">`;
});

div.innerHTML=html;
}
</script>

</body>
</html>
