<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Memories</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #ff00cc;
            --secondary: #3333ff;
            --bg: #0a001a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: white;
            padding-bottom: 50px;
        }

        h1 { text-align: center; margin: 20px 0; font-weight: 300; letter-spacing: 2px; }

        /* Inputs & Buttons */
        .container { width: 90%; margin: 0 auto; max-width: 500px; }
        
        input {
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--card-bg);
            color: white;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        input:focus { outline: none; border-color: var(--primary); background: rgba(255,255,255,0.1); }

        button {
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Album Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }

        .album-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 10px;
            text-align: center;
            overflow: hidden;
            transition: 0.3s;
        }

        .album-card:hover { transform: translateY(-5px); border-color: var(--primary); }

        .thumb-container {
            width: 100%;
            aspect-ratio: 1/1;
            background: #111;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .album-card h3 { margin: 5px 0; font-size: 1rem; }
        .album-card p { margin: 0; font-size: 0.8rem; opacity: 0.6; }

        .action-btns { display: flex; gap: 5px; margin-top: 10px; }
        .action-btns button { padding: 8px; margin: 0; font-size: 0.8rem; }

        /* Detail View */
        .photo-item { position: relative; border-radius: 10px; overflow: hidden; aspect-ratio: 1/1; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .del-btn {
            position: absolute; top: 5px; right: 5px;
            background: rgba(255,0,0,0.7); width: 30px; height: 30px; 
            padding: 0; border-radius: 50%;
        }

        /* Lock Screen */
        #lockScreen {
            position: fixed; top:0; left:0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>

<body>

<div id="lockScreen">
    <h2>🔐 Personal Vault</h2>
    <div style="width: 80%; max-width: 300px;">
        <input id="pass" type="password" placeholder="Enter Password" style="text-align: center;">
        <button onclick="unlock()">Unlock</button>
    </div>
</div>

<div class="container">
    <h1>📸 My Memories</h1>
    <input id="search" placeholder="🔍 Search photos or albums..." oninput="display()">
    
    <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border);">
        <input id="albumName" placeholder="Album Name (Optional AI Detect)">
        <input type="file" id="fileInput" multiple style="border: 2px dashed var(--glass-border); padding: 20px; background: transparent;">
        <button id="uploadBtn" onclick="upload(this)">Upload to Cloud</button>
    </div>
</div>

<div id="albums"></div>

<script>
    const PASSWORD = "1234";
    const CLOUD_NAME = "dzfssbg4j";
    const UPLOAD_PRESET = "memories_upload";

    let albums = JSON.parse(localStorage.getItem("albums")) || {};

    function save() {
        localStorage.setItem("albums", JSON.stringify(albums));
    }

    function unlock() {
        if (document.getElementById("pass").value === PASSWORD) {
            document.getElementById("lockScreen").style.display = "none";
            display();
        } else {
            alert("Access Denied");
        }
    }

    // AI Detection Logic
    function detectAI(name) {
        name = name.toLowerCase();
        if (name.includes("cake") || name.includes("birthday")) return "🎂 Birthday";
        if (name.includes("travel") || name.includes("trip") || name.includes("beach")) return "✈️ Travel";
        if (name.includes("family") || name.includes("mom") || name.includes("dad")) return "👨‍👩‍👧 Family";
        return "📦 Others";
    }

    async function upload(btn) {
        const files = document.getElementById("fileInput").files;
        if (files.length === 0) return alert("Select files first");

        btn.innerText = "Processing...";
        btn.disabled = true;

        for (let file of files) {
            let formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);

            try {
                let res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, {
                    method: "POST",
                    body: formData
                });
                let data = await res.json();
                
                // Optimization: Add q_auto,f_auto to Cloudinary URL
                let optimizedUrl = data.secure_url.replace('/upload/', '/upload/q_auto,f_auto/');

                let manual = document.getElementById("albumName").value;
                let albumKey = manual ? manual : detectAI(file.name);

                if (!albums[albumKey]) albums[albumKey] = { items: [] };
                albums[albumKey].items.push({ url: optimizedUrl, name: file.name });
            } catch (e) {
                console.error("Upload failed", e);
            }
        }

        save();
        display();
        btn.innerText = "Upload to Cloud";
        btn.disabled = false;
        document.getElementById("fileInput").value = "";
    }

    function display() {
        let div = document.getElementById("albums");
        let search = document.getElementById("search").value.toLowerCase();
        let html = '<div class="grid">';

        for (let name in albums) {
            let items = albums[name].items;
            let match = name.toLowerCase().includes(search) || 
                        items.some(i => i.name.toLowerCase().includes(search));

            if (!match) continue;

            let first = items[0];
            html += `
                <div class="album-card">
                    <div onclick="openAlbum('${name}')">
                        <div class="thumb-container">
                            ${first ? `<img src="${first.url}" loading="lazy">` : `<span style="font-size:2rem">📁</span>`}
                        </div>
                        <h3>${name}</h3>
                        <p>${items.length} items</p>
                    </div>
                    <div class="action-btns">
                        <button onclick="renameAlbum('${name}')">✏️</button>
                        <button onclick="deleteAlbum('${name}')" style="background:rgba(255,0,0,0.2)">🗑️</button>
                    </div>
                </div>`;
        }
        html += '</div>';
        div.innerHTML = html;
    }

    function openAlbum(name) {
        let div = document.getElementById("albums");
        let html = `
            <div class="container" style="margin-top:20px">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <button onclick="display()" style="width:auto; padding:8px 20px;">⬅ Back</button>
                    <h2 style="margin:0">${name}</h2>
                </div>
                <div class="grid" style="margin-top:20px; padding:0;">`;

        albums[name].items.forEach((item, i) => {
            html += `
                <div class="photo-item">
                    <img src="${item.url}" onclick="window.open('${item.url}', '_blank')">
                    <button class="del-btn" onclick="deleteItem('${name}',${i})">×</button>
                </div>`;
        });

        html += `</div></div>`;
        div.innerHTML = html;
    }

    function deleteItem(name, i) {
        if(confirm("Remove this photo?")) {
            albums[name].items.splice(i, 1);
            save();
            openAlbum(name);
        }
    }

    function deleteAlbum(name) {
        if (confirm(`Delete the entire "${name}" album?`)) {
            delete albums[name];
            save();
            display();
        }
    }

    function renameAlbum(name) {
        let newName = prompt("Enter new album name:", name);
        if (newName && newName !== name) {
            albums[newName] = albums[name];
            delete albums[name];
            save();
            display();
        }
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
