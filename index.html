<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Memory Vault | Master Edition</title>
    <style>
        :root {
            --primary: #ff00cc;
            --secondary: #3333ff;
            --bg: #050010;
            --card-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --accent-glow: rgba(188, 19, 254, 0.2);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, var(--accent-glow), transparent 75%);
            background-attachment: fixed;
            color: var(--text-main);
            padding-bottom: 80px; min-height: 100vh;
            transition: background 1.5s ease, background-color 1.5s ease;
        }

        /* PREMIUM LOCK SCREEN */
        #lockScreen {
            position: fixed; inset: 0; background: #050010; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            backdrop-filter: blur(20px);
        }
        #lockScreen h2 { font-weight: 200; letter-spacing: 4px; margin-bottom: 30px; }
        
        /* HEADER */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(5, 0, 16, 0.8); backdrop-filter: blur(20px);
            padding: 15px 0; border-bottom: 1px solid var(--glass-border);
            text-align: center;
        }
        .header h1 { 
            margin: 0; font-size: 1.4rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .container { width: 92%; margin: 0 auto; max-width: 600px; padding-top: 20px; }

        /* INPUTS & UI */
        input, select {
            width: 100%; margin: 8px 0; padding: 14px; box-sizing: border-box;
            border-radius: 14px; border: 1px solid var(--glass-border);
            background: var(--card-bg); color: white; font-size: 16px;
        }
        button {
            width: 100%; margin: 10px 0; padding: 14px; border-radius: 14px;
            border: none; background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        button:active { transform: scale(0.98); }

        /* GRID & CARDS */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px 0; }
        .album-card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 12px; position: relative; transition: 0.3s;
        }
        .thumb-container {
            width: 100%; aspect-ratio: 1/1; background: #111;
            border-radius: 14px; overflow: hidden; margin-bottom: 10px;
        }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }

        .photo-item { position: relative; border-radius: 14px; overflow: hidden; aspect-ratio: 1/1; border: 1px solid var(--glass-border); }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }

        /* ACTION BUTTONS */
        .action-row { display: flex; gap: 8px; margin-top: 5px; }
        .mini-btn { padding: 8px; font-size: 0.7rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); flex: 1; }
        .fav-btn { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.5); border: none; border-radius: 50%; width: 32px; height: 32px; color: white; cursor: pointer; backdrop-filter: blur(5px); }
        .fav-btn.active { color: #ff0055; }
        .del-photo { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.6); border: none; color: white; border-radius: 50%; width: 24px; height: 24px; font-size: 10px; }

        /* SLIDESHOW OVERLAY */
        #slideshowOverlay {
            position: fixed; inset: 0; background: black; z-index: 2000;
            display: none; justify-content: center; align-items: center;
        }
        #slideshowImg { max-width: 100%; max-height: 100%; object-fit: contain; transition: opacity 0.8s ease; }
    </style>
</head>
<body>

<div id="lockScreen">
    <div style="font-size: 3rem; margin-bottom: 10px;">🔐</div>
    <h2>PRIVATE VAULT</h2>
    <input id="pass" type="password" placeholder="PIN" style="width: 180px; text-align: center; letter-spacing: 6px;">
    <button onclick="unlock()" style="width: 180px;">Enter</button>
</div>

<div id="slideshowOverlay">
    <button onclick="stopSlideshow()" style="position:absolute; top:20px; right:20px; width:40px; border-radius:50%; background:rgba(255,255,255,0.2);">×</button>
    <img id="slideshowImg">
</div>

<div class="header">
    <h1>📸 AI MEMORY VAULT</h1>
</div>

<div class="container">
    <input id="search" placeholder="🔍 Search tags or folders..." oninput="display()">
    
    <div style="background:var(--card-bg); padding:15px; border-radius:20px; border:1px solid var(--glass-border); margin-bottom:15px;">
        <input id="albumName" list="album-list" placeholder="Album Name (e.g. Food)">
        <datalist id="album-list"></datalist>
        <input type="file" id="fileInput" multiple>
        <button id="uploadBtn" onclick="upload(this)">Cloud Upload</button>
    </div>

    <div id="albums"></div>
</div>

<script>
    const PASSWORD = "1234";
    const CLOUD_NAME = "dzfssbg4j";
    const UPLOAD_PRESET = "memories_upload";

    let albums = JSON.parse(localStorage.getItem("albums")) || {};
    let ssInterval;

    function save() { 
        localStorage.setItem("albums", JSON.stringify(albums)); 
        updateDatalist();
    }

    function applyTimeTheme() {
        const hour = new Date().getHours();
        const root = document.documentElement.style;
        if (hour >= 6 && hour < 11) { root.setProperty('--accent-glow', 'rgba(255, 120, 180, 0.3)'); }
        else if (hour >= 11 && hour < 17) { root.setProperty('--accent-glow', 'rgba(0, 210, 255, 0.3)'); }
        else { root.setProperty('--accent-glow', 'rgba(188, 19, 254, 0.2)'); }
    }

    function unlock() {
        if (document.getElementById("pass").value === PASSWORD) {
            document.getElementById("lockScreen").style.display = "none";
            applyTimeTheme(); updateDatalist(); display();
        } else { alert("Access Denied"); }
    }

    function updateDatalist() {
        const dl = document.getElementById("album-list");
        dl.innerHTML = Object.keys(albums).map(n => `<option value="${n}">`).join('');
    }

    async function upload(btn) {
        const files = document.getElementById("fileInput").files;
        if (files.length === 0) return alert("Select photos first");
        btn.innerText = "⏳ AI Tagging...";
        btn.disabled = true;

        for (let file of files) {
            let formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);
            formData.append("categorization", "google_tagging");

            try {
                let res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: "POST", body: formData });
                let data = await res.json();
                let albumKey = document.getElementById("albumName").value || "General";
                if (!albums[albumKey]) albums[albumKey] = { items: [] };
                
                albums[albumKey].items.unshift({ 
                    url: data.secure_url, 
                    thumb: data.secure_url.replace('/upload/', '/upload/w_500,c_fill/'), 
                    tags: data.tags || [], fav: false
                });
            } catch (e) { console.error(e); }
        }
        save(); display(); btn.innerText = "Cloud Upload"; btn.disabled = false;
    }

    function display() {
        applyTimeTheme();
        let div = document.getElementById("albums");
        let search = document.getElementById("search").value.toLowerCase();
        let html = '<div class="grid">';

        // FAVORITES SECTION
        let favs = [];
        for (let name in albums) albums[name].items.forEach(i => { if(i.fav) favs.push(i); });
        if (favs.length > 0) {
            html += `
                <div class="album-card" style="border: 1px solid var(--primary);">
                    <div onclick="openAlbum('Favorites', true)">
                        <div class="thumb-container"><img src="${favs[0].thumb}"></div>
                        <h3>❤️ Favorites</h3><p>${favs.length} items</p>
                    </div>
                </div>`;
        }

        for (let name in albums) {
            let items = albums[name].items;
            let matches = name.toLowerCase().includes(search) || 
                          items.some(i => i.tags?.some(t => t.toLowerCase().includes(search)));
            if (!matches && search !== "") continue;

            html += `
                <div class="album-card">
                    <div onclick="openAlbum('${name}', false)">
                        <div class="thumb-container"><img src="${items[0] ? items[0].thumb : ''}"></div>
                        <h3>${name}</h3><p>${items.length} items</p>
                    </div>
                    <div class="action-row">
                        <button class="mini-btn" onclick="renameAlbum('${name}')">✏️</button>
                        <button class="mini-btn" onclick="deleteAlbum('${name}')">🗑️</button>
                    </div>
                </div>`;
        }
        div.innerHTML = html + '</div>';
    }

    function openAlbum(name, isFav) {
        let div = document.getElementById("albums");
        let items = isFav ? [] : albums[name].items;
        if(isFav) for(let n in albums) albums[n].items.forEach(i => { if(i.fav) items.push(i); });

        let html = `<div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button onclick="display()" style="width:70px">Back</button>
                <button onclick="startSlideshow('${name}', ${isFav})" style="background:var(--secondary)">▶ Slideshow</button>
            </div>
            <h2>${name}</h2><div class="grid">`;
        
        items.forEach((item, i) => {
            html += `
                <div class="photo-item">
                    <img src="${item.thumb}" onclick="window.open('${item.url}')">
                    <button class="fav-btn ${item.fav ? 'active' : ''}" onclick="toggleFav('${name}', ${i}, ${isFav})">❤️</button>
                    <button class="del-photo" onclick="deletePhoto('${name}', ${i})">×</button>
                </div>`;
        });
        div.innerHTML = html + `</div></div>`;
    }

    function toggleFav(albumName, i, isFavView) {
        if(isFavView) return alert("Untoggle in original album");
        albums[albumName].items[i].fav = !albums[albumName].items[i].fav;
        save(); openAlbum(albumName, false);
    }

    function startSlideshow(name, isFav) {
        let items = isFav ? [] : albums[name].items;
        if(isFav) for(let n in albums) albums[n].items.forEach(i => { if(i.fav) items.push(i); });
        if (items.length === 0) return;
        
        const overlay = document.getElementById("slideshowOverlay");
        const img = document.getElementById("slideshowImg");
        overlay.style.display = "flex";
        let idx = 0; img.src = items[idx].url;
        
        ssInterval = setInterval(() => {
            img.style.opacity = 0;
            setTimeout(() => {
                idx = (idx + 1) % items.length;
                img.src = items[idx].url;
                img.style.opacity = 1;
            }, 800);
        }, 4000);
    }

    function stopSlideshow() {
        clearInterval(ssInterval);
        document.getElementById("slideshowOverlay").style.display = "none";
    }

    function renameAlbum(old) {
        let n = prompt("New name:", old);
        if (n && n !== old) { albums[n] = albums[old]; delete albums[old]; save(); display(); }
    }

    function deleteAlbum(name) {
        if (confirm("Delete album?")) { delete albums[name]; save(); display(); }
    }

    function deletePhoto(album, i) {
        if(confirm("Delete photo?")) {
            albums[album].items.splice(i, 1);
            if(albums[album].items.length === 0) delete albums[album];
            save(); openAlbum(album, false);
        }
    }
</script>
</body>
</html>
