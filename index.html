<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Memories</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff00cc">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #1a0033, #000);
    color: white;
}

/* SPLASH */
#splash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}
#splash h1 {
    color: #ff00cc;
    text-shadow: 0 0 20px #ff00cc;
}

/* HEADER */
h1 {
    text-align: center;
    padding: 20px;
    color: #ff4dff;
    text-shadow: 0 0 15px #ff00ff;
}

/* INPUT */
input {
    width: 90%;
    margin: 10px auto;
    display: block;
    padding: 15px;
    border-radius: 12px;
    border: none;
}

/* BUTTON */
button {
    width: 90%;
    margin: 10px auto;
    display: block;
    padding: 15px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    background: linear-gradient(90deg, #ff00cc, #3333ff);
    color: white;
    box-shadow: 0 0 15px #ff00cc;
}

/* ALBUM */
.album {
    margin: 15px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    box-shadow: 0 0 20px rgba(255,0,255,0.3);
}

.media {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
}

.deleteBtn {
    background: red;
    padding: 8px;
    margin-top: 5px;
    font-size: 12px;
}
</style>
</head>

<body>

<!-- SPLASH (click to skip also) -->
<div id="splash" onclick="this.style.display='none'">
    <h1>📸 Memories</h1>
</div>

<h1>📸 My Private Memories</h1>

<input id="albumName" placeholder="Album Name">
<button onclick="createAlbum()">Create Album</button>

<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload Photo / Video</button>

<div id="albums"></div>

<script>
let CLOUD_NAME = "dzfssbg4j";
let UPLOAD_PRESET = "memories_upload";

let albums = JSON.parse(localStorage.getItem("albums")) || {};

function saveData(){
    localStorage.setItem("albums", JSON.stringify(albums));
}

/* ✅ FIXED SPLASH (IMPORTANT) */
document.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => {
        let splash = document.getElementById("splash");
        if (splash) splash.style.display = "none";
    }, 1200);
});

/* CREATE ALBUM */
function createAlbum(){
    let name = document.getElementById("albumName").value;
    if(!name) return alert("Enter album name");

    if(!albums[name]){
        albums[name] = [];
        saveData();
        displayAlbums();
    }
}

/* UPLOAD */
async function uploadFile(){
    let file = document.getElementById("fileInput").files[0];
    if(!file) return alert("Select file");

    let formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", UPLOAD_PRESET);

    let res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    if(!data.secure_url){
        alert("Upload failed");
        return;
    }

    let album = document.getElementById("albumName").value || "Default";

    if(!albums[album]) albums[album] = [];

    albums[album].push({
        type: file.type.startsWith("video") ? "video" : "image",
        url: data.secure_url
    });

    saveData();
    displayAlbums();
}

/* DELETE */
function deleteItem(album, index){
    if(confirm("Delete this item?")){
        albums[album].splice(index,1);
        saveData();
        displayAlbums();
    }
}

/* SLIDESHOW */
function startSlideshow(album){
    let items = albums[album];
    if(!items || items.length === 0) return;

    let index = 0;

    let viewer = document.createElement("div");
    viewer.style = `
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:black;
        display:flex;
        justify-content:center;
        align-items:center;
        z-index:9999;
    `;

    document.body.appendChild(viewer);

    function show(){
        viewer.innerHTML = "";

        let item = items[index];

        if(item.type === "image"){
            viewer.innerHTML = `<img src="${item.url}" style="max-width:90%">`;
        } else {
            viewer.innerHTML = `<video src="${item.url}" autoplay controls style="max-width:90%"></video>`;
        }

        index++;
        if(index >= items.length) index = 0;
    }

    show();
    let interval = setInterval(show, 3000);

    viewer.onclick = ()=>{
        clearInterval(interval);
        viewer.remove();
    };
}

/* DISPLAY */
let currentAlbum = null;

/* DISPLAY ALBUM LIST (GRID) */
function displayAlbums(){
    let container = document.getElementById("albums");
    container.innerHTML = "";

    if(currentAlbum){
        displaySingleAlbum(currentAlbum);
        return;
    }

    let html = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;">`;

    for(let album in albums){
        html += `
        <div onclick="openAlbum('${album}')" 
        style="padding:20px;background:rgba(255,255,255,0.05);
        border-radius:15px;text-align:center;
        box-shadow:0 0 15px #ff00cc;">
            <h3>${album}</h3>
            <p>${albums[album].length} items</p>
        </div>`;
    }

    html += `</div>`;
    container.innerHTML = html;
}

/* OPEN ALBUM */
function openAlbum(name){
    currentAlbum = name;
    displayAlbums();
}

/* BACK */
function goBack(){
    currentAlbum = null;
    displayAlbums();
}

/* SHOW SINGLE ALBUM */
function displaySingleAlbum(album){
    let container = document.getElementById("albums");

    let html = `
    <button onclick="goBack()">⬅ Back</button>
    <h2 style="text-align:center">${album}</h2>
    <button onclick="startSlideshow('${album}')">▶ Slideshow</button>
    `;

    albums[album].forEach((item, index)=>{
        if(item.type === "image"){
            html += `<img class="media" src="${item.url}">`;
        } else {
            html += `<video class="media" controls src="${item.url}"></video>`;
        }

        html += `<button class="deleteBtn" onclick="deleteItem('${album}', ${index})">Delete</button>`;
    });

    container.innerHTML = html;
}


displayAlbums();
</script>

</body>
</html>
