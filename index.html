<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Memories | AI Vault</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #ff00cc;
            --secondary: #3333ff;
            --bg: #050010;
            --card-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --accent-glow: transparent;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, var(--accent-glow), var(--bg) 80%);
            background-attachment: fixed;
            color: var(--text-main);
            padding-bottom: 80px;
            transition: all 1.5s ease-in-out;
        }

        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(5, 0, 16, 0.7); backdrop-filter: blur(20px);
            padding: 15px 0; border-bottom: 1px solid var(--glass-border);
            text-align: center;
        }

        .header h1 { 
            margin: 0; font-size: 1.4rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .container { width: 92%; margin: 0 auto; max-width: 600px; padding-top: 10px; }

        /* SETTINGS & TOGGLES */
        .settings-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--card-bg); padding: 10px 15px; border-radius: 12px; margin-bottom: 15px;
            font-size: 0.8rem; border: 1px solid var(--glass-border);
        }

        /* SEARCH & UPLOAD */
        input, select {
            width: 100%; margin: 8px 0; padding: 14px; box-sizing: border-box;
            border-radius: 14px; border: 1px solid var(--glass-border);
            background: var(--card-bg); color: white; font-size: 16px;
        }

        button {
            width: 100%; margin: 10px 0; padding: 14px; border-radius: 14px;
            border: none; background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: 600; cursor: pointer;
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px 0; }
        
        .album-card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 18px; padding: 12px; position: relative;
        }

        .thumb-container {
            width: 100%; aspect-ratio: 1/1; background: #111;
            border-radius: 12px; overflow: hidden;
        }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }

        .photo-item { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 1/1; border: 1px solid var(--glass-border); }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        
        .tag-badge { font-size: 0.6rem; background: rgba(255,255,255,0.1); padding: 2px 5px; border-radius: 4px; margin-right: 3px; }

        #lockScreen {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* WATERMARK TOGGLE SWITCH */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        input:checked + .slider { background-color: var(--primary); }
    </style>
</head>
<body>

<div id="lockScreen">
    <h2 style="font-weight: 300;">ENTER VAULT</h2>
    <input id="pass" type="password" placeholder="PIN" style="width: 180px; text-align: center; letter-spacing: 5px;">
    <button onclick="unlock()" style="width: 180px;">Unlock</button>
</div>

<div class="header">
    <h1>📸 AI MEMORY VAULT</h1>
</div>

<div class="container">
    <div class="settings-bar">
        <span>✍️ Digital Watermark</span>
        <label class="switch">
            <input type="checkbox" id="watermarkToggle" onchange="saveSettings()">
            <span class="slider"></span>
        </label>
    </div>

    <input id="search" placeholder="🔍 Search tags (e.g. 'Cake', 'Beach', 'Cat')" oninput="display()">
    
    <div class="upload-area" style="background:var(--card-bg); padding:15px; border-radius:20px; border:1px solid var(--glass-border);">
        <input id="albumName" list="album-list" placeholder="Album Name (e.g. Food)">
        <datalist id="album-list"></datalist>
        <input type="file" id="fileInput" multiple>
        <button id="uploadBtn" onclick="upload(this)">Cloud Upload</button>
    </div>

    <div id="albums"></div>
</div>

<script>
    const PASSWORD = "1234";
    const CLOUD_NAME = "dzfssbg4j";
    const UPLOAD_PRESET = "memories_upload";

    let albums = JSON.parse(localStorage.getItem("albums")) || {};
    let useWatermark = JSON.parse(localStorage.getItem("useWatermark")) || false;

    function save() { 
        localStorage.setItem("albums", JSON.stringify(albums)); 
        updateDatalist();
    }

    function saveSettings() {
        useWatermark = document.getElementById("watermarkToggle").checked;
        localStorage.setItem("useWatermark", JSON.stringify(useWatermark));
    }

    function unlock() {
        if (document.getElementById("pass").value === PASSWORD) {
            document.getElementById("lockScreen").style.display = "none";
            document.getElementById("watermarkToggle").checked = useWatermark;
            applyTimeTheme();
            updateDatalist();
            display();
        } else { alert("Wrong PIN"); }
    }

    function applyTimeTheme() {
        const h = new Date().getHours();
        const root = document.documentElement.style;
        if (h < 11) root.setProperty('--accent-glow', '#ff008033');
        else if (h < 17) root.setProperty('--accent-glow', '#00d2ff33');
        else root.setProperty('--accent-glow', '#3333ff33');
    }

    function updateDatalist() {
        const dl = document.getElementById("album-list");
        dl.innerHTML = Object.keys(albums).map(name => `<option value="${name}">`).join('');
    }

    async function upload(btn) {
        const files = document.getElementById("fileInput").files;
        if (files.length === 0) return;
        btn.innerText = "🤖 AI Tagging & Uploading...";
        btn.disabled = true;

        for (let file of files) {
            let formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);
            // This flag tells Cloudinary to run AI categorization
            formData.append("categorization", "google_tagging"); 

            try {
                let res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: "POST", body: formData });
                let data = await res.json();
                
                // Get AI Tags or default to empty
                let aiTags = data.tags || [];
                let rawUrl = data.secure_url;
                let thumbUrl = rawUrl.replace('/upload/', '/upload/w_500,h_500,c_fill,g_auto,q_auto,f_auto/');
                
                let manual = document.getElementById("albumName").value || "General";
                if (!albums[manual]) albums[manual] = { items: [] };
                
                albums[manual].items.unshift({ 
                    url: rawUrl, 
                    thumb: thumbUrl, 
                    tags: aiTags,
                    date: new Date().toLocaleDateString()
                });
            } catch (e) { console.error(e); }
        }

        save(); display(); btn.innerText = "Cloud Upload"; btn.disabled = false;
        document.getElementById("fileInput").value = "";
    }

    function display() {
        let div = document.getElementById("albums");
        let search = document.getElementById("search").value.toLowerCase();
        let html = '<div class="grid fade-in">';

        for (let name in albums) {
            // AI SEARCH LOGIC: Check album name OR AI tags
            let items = albums[name].items;
            let matchesSearch = name.toLowerCase().includes(search) || 
                                items.some(item => item.tags && item.tags.some(t => t.toLowerCase().includes(search)));
            
            if (!matchesSearch && search !== "") continue;

            html += `
                <div class="album-card" onclick="openAlbum('${name}')">
                    <div class="thumb-container">
                        <img src="${items[0] ? items[0].thumb : ''}" onerror="this.src='https://placehold.co/400x400?text=Empty'">
                    </div>
                    <h3 style="margin:8px 0 2px 0; font-size:0.9rem;">${name}</h3>
                    <p style="margin:0; font-size:0.7rem; color:#888;">${items.length} Memories</p>
                </div>`;
        }
        div.innerHTML = html + '</div>';
    }

    function openAlbum(name) {
        let div = document.getElementById("albums");
        let html = `<button onclick="display()" style="width:80px; margin-bottom:15px;">Back</button>
                    <h2>${name}</h2><div class="grid">`;
        
        albums[name].items.forEach((item, i) => {
            html += `<div class="photo-item">
                <img src="${item.thumb}" onclick="viewImage('${item.url}')">
                <div style="position:absolute; bottom:5px; left:5px; display:flex; flex-wrap:wrap;">
                    ${(item.tags || []).slice(0, 2).map(t => `<span class="tag-badge">${t}</span>`).join('')}
                </div>
            </div>`;
        });
        div.innerHTML = html + `</div>`;
    }

    function viewImage(url) {
        let finalUrl = url;
        if (useWatermark) {
            // CLOUDINARY WATERMARK MAGIC: Adds "Private Vault" text in the bottom right
            // We insert the transformation string into the URL
            const watermarkStyle = "l_text:Arial_40_bold:© My Private Vault,co_white,g_south_east,x_20,y_20,o_50";
            finalUrl = url.replace('/upload/', `/upload/${watermarkStyle}/`);
        }
        window.open(finalUrl, '_blank');
    }

    function renameAlbum(old) {
        let n = prompt("New name:", old);
        if (n && n !== old) { albums[n] = albums[old]; delete albums[old]; save(); display(); }
    }

    function deleteAlbum(name) {
        if (confirm("Delete album?")) { delete albums[name]; save(); display(); }
    }
</script>
</body>
</html>
