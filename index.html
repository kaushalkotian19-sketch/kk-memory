<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Memories</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #ff5e78;
    color: white;
    text-align: center;
    padding: 15px;
}

.container {
    padding: 15px;
}

input, button {
    padding: 10px;
    margin: 5px 0;
    width: 100%;
    border-radius: 8px;
    border: none;
}

button {
    background: #ff5e78;
    color: white;
    font-weight: bold;
}

.album {
    background: white;
    padding: 10px;
    border-radius: 10px;
    margin-top: 15px;
}

.slideshow {
    position: relative;
    width: 100%;
    max-width: 300px;
}

.slide {
    display: none;
    width: 100%;
    border-radius: 10px;
}

.active {
    display: block;
}
</style>
</head>

<body>

<header>
    <h2>📸 My Memories</h2>
    <p>Family • Friends • Travel</p>
</header>

<div class="container">

    <input type="text" id="albumName" placeholder="Enter Album Name">
    <button onclick="createAlbum()">Create Album</button>

    <input type="text" id="imageURL" placeholder="Paste Image URL">
    <button onclick="addImage()">Add Image</button>

    <div id="albums"></div>

</div>

<script>

let albums = JSON.parse(localStorage.getItem("albums")) || {};

function saveData(){
    localStorage.setItem("albums", JSON.stringify(albums));
}

function createAlbum(){
    let name = document.getElementById("albumName").value;
    if(!name) return alert("Enter album name");

    if(!albums[name]) albums[name] = [];

    saveData();
    displayAlbums();
}

function addImage(){
    let url = document.getElementById("imageURL").value;
    if(!url) return alert("Enter image URL");

    let album = prompt("Enter album name:");

    if(!albums[album]) albums[album] = [];

    albums[album].push(url);

    saveData();
    displayAlbums();
}

function displayAlbums(){
    let container = document.getElementById("albums");
    container.innerHTML = "";

    for(let name in albums){
        let div = document.createElement("div");
        div.className = "album";

        let html = `<h3>${name}</h3><div class="slideshow">`;

        albums[name].forEach((img, i) => {
            html += `<img class="slide ${i===0 ? 'active' : ''}" src="${img}">`;
        });

        html += `</div>`;
        div.innerHTML = html;

        container.appendChild(div);
    }

    startSlides();
}

function startSlides(){
    setInterval(() => {
        document.querySelectorAll(".slideshow").forEach(slideshow => {
            let slides = slideshow.querySelectorAll(".slide");
            let activeIndex = 0;

            slides.forEach((s, i) => {
                if (s.classList.contains("active")) {
                    s.classList.remove("active");
                    activeIndex = i;
                }
            });

            let next = (activeIndex + 1) % slides.length;
            slides[next].classList.add("active");
        });
    }, 2500);
}

displayAlbums();

</script>

</body>
</html>
