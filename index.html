<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Memories</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1a0033, #000);
    color: white;
}

h1 {
    text-align: center;
    padding: 15px;
    color: #ff4dff;
    text-shadow: 0 0 20px #ff00ff;
}

input {
    width: 90%;
    margin: 8px auto;
    display: block;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #1a1a1a;
    color: white;
}

button {
    width: 90%;
    margin: 8px auto;
    display: block;
    padding: 12px;
    border-radius: 12px;
    border: none;
    font-weight: bold;
    background: linear-gradient(90deg, #ff00cc, #3333ff);
    color: white;
    box-shadow: 0 0 10px #ff00cc;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px;
}

.albumCard {
    position: relative;
    height: 160px;
    border-radius: 16px;
    overflow: hidden;
    background: #111;
    box-shadow: 0 0 15px #ff00cc;
}

.cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 8px;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
}

.overlay h3 {
    margin: 0;
    font-size: 16px;
}

.overlay p {
    margin: 0;
    font-size: 12px;
    opacity: 0.7;
}

.empty {
    text-align: center;
    opacity: 0.5;
    padding: 40px 0;
}

.media {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
}

.deleteBtn {
    background: red;
}

#viewer {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
</style>
</head>

<body>

<h1>📸 My Memories</h1>

<input id="search" placeholder="Search album..." oninput="displayAlbums()">
<input id="albumName" placeholder="Album Name (optional AI will decide)">

<button onclick="createAlbum()">Create Album</button>

<input type="file" id="fileInput">
<button onclick="uploadFile(this)">Upload</button>

<div id="albums"></div>

<div id="viewer" onclick="closeViewer()"></div>

<script>
let CLOUD_NAME = "dzfssbg4j";
let UPLOAD_PRESET = "memories_upload";

let albums = JSON.parse(localStorage.getItem("albums")) || {};
let lockedAlbums = JSON.parse(localStorage.getItem("locked")) || {};

let currentAlbum = null;

/* SAVE */
function saveData(){
    localStorage.setItem("albums", JSON.stringify(albums));
    localStorage.setItem("locked", JSON.stringify(lockedAlbums));
}

/* AI DETECTION */
function detectAlbumAI(fileName){
    let name = fileName.toLowerCase();

    if(name.includes("birthday") || name.includes("cake") || name.includes("bday")){
        return "🎂 Birthday";
    }

    if(name.includes("trip") || name.includes("travel") || name.includes("beach") || name.includes("tour")){
        return "✈️ Travel";
    }

    if(name.includes("family") || name.includes("mom") || name.includes("dad") || name.includes("home")){
        return "👨‍👩‍👧 Family";
    }

    return "📦 Others";
}

/* CREATE */
function createAlbum(){
    let name = document.getElementById("albumName").value;
    if(!name) return;

    if(!albums[name]){
        albums[name] = [];
        saveData();
        displayAlbums();
    }
}

/* UPLOAD */
async function uploadFile(btn){
    let file = document.getElementById("fileInput").files[0];
    if(!file) return;

    btn.innerText = "Uploading...";
    btn.disabled = true;

    let formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", UPLOAD_PRESET);

    let res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    let manualAlbum = document.getElementById("albumName").value;
    let album = manualAlbum ? manualAlbum : detectAlbumAI(file.name);

    if(!albums[album]) albums[album] = [];

    albums[album].push({
        type: file.type.startsWith("video") ? "video" : "image",
        url: data.secure_url
    });

    saveData();
    displayAlbums();

    btn.innerText = "Upload";
    btn.disabled = false;
}

/* DISPLAY */
function displayAlbums(){
    let search = document.getElementById("search").value.toLowerCase();
    let container = document.getElementById("albums");

    if(currentAlbum){
        showAlbum(currentAlbum);
        return;
    }

    let html = `<div class="grid">`;

    for(let name in albums){
        if(!name.toLowerCase().includes(search)) continue;

        let cover = albums[name][0]?.url;

        html += `
        <div class="albumCard" onclick="openAlbum('${name}')">

            ${cover 
                ? `<img class="cover" src="${cover}">`
                : `<div class="empty">📂<br>No Memories</div>`
            }

            <div class="overlay">
                <h3>${name}</h3>
                <p>${albums[name].length} items ${lockedAlbums[name] ? "🔒" : ""}</p>
            </div>

        </div>`;
    }

    html += `</div>`;
    container.innerHTML = html;
}

/* OPEN */
function openAlbum(name){
    if(lockedAlbums[name]){
        let pass = prompt("Enter password");
        if(pass !== lockedAlbums[name]) return alert("Wrong password");
    }

    currentAlbum = name;
    showAlbum(name);
}

/* SHOW */
function showAlbum(name){
    let container = document.getElementById("albums");

    let html = `
    <button onclick="goBack()">⬅ Back</button>
    <button onclick="lockAlbum('${name}')">🔒 Lock</button>
    <h2>${name}</h2>
    `;

    albums[name].forEach((item, i)=>{
        if(item.type === "image"){
            html += `<img class="media" src="${item.url}" onclick="openViewer('${name}', ${i})">`;
        } else {
            html += `<video class="media" src="${item.url}" controls></video>`;
        }

        html += `<button class="deleteBtn" onclick="deleteItem('${name}', ${i})">Delete</button>`;
    });

    container.innerHTML = html;
}

/* DELETE */
function deleteItem(name, i){
    albums[name].splice(i,1);
    saveData();
    showAlbum(name);
}

/* LOCK */
function lockAlbum(name){
    let pass = prompt("Set password");
    if(pass){
        lockedAlbums[name] = pass;
        saveData();
        alert("Locked!");
    }
}

/* BACK */
function goBack(){
    currentAlbum = null;
    displayAlbums();
}

/* VIEWER */
let viewIndex = 0;
let viewAlbum = "";

function openViewer(album, index){
    viewAlbum = album;
    viewIndex = index;

    document.getElementById("viewer").style.display = "flex";
    showViewer();
}

function showViewer(){
    let item = albums[viewAlbum][viewIndex];

    if(item.type === "image"){
        document.getElementById("viewer").innerHTML =
            `<img src="${item.url}" style="max-width:90%">`;
    } else {
        document.getElementById("viewer").innerHTML =
            `<video src="${item.url}" controls autoplay style="max-width:90%"></video>`;
    }
}

/* SWIPE */
let startX = 0;

document.getElementById("viewer").addEventListener("touchstart", e=>{
    startX = e.touches[0].clientX;
});

document.getElementById("viewer").addEventListener("touchend", e=>{
    let diff = e.changedTouches[0].clientX - startX;

    if(diff > 50) prev();
    if(diff < -50) next();
});

function next(){
    viewIndex++;
    if(viewIndex >= albums[viewAlbum].length) viewIndex = 0;
    showViewer();
}

function prev(){
    viewIndex--;
    if(viewIndex < 0) viewIndex = albums[viewAlbum].length-1;
    showViewer();
}

function closeViewer(){
    document.getElementById("viewer").style.display = "none";
}

displayAlbums();
</script>

</body>
</html>
