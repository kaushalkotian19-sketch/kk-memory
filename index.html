<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Memories | Personal Vault</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #ff00cc;
            --secondary: #3333ff;
            --bg: #050010;
            --card-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            padding-bottom: 80px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }

        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(5, 0, 16, 0.85);
            backdrop-filter: blur(15px);
            padding: 15px 0; border-bottom: 1px solid var(--glass-border);
            text-align: center;
        }

        .header h1 { 
            margin: 0; font-size: 1.4rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .container { width: 92%; margin: 0 auto; max-width: 600px; padding-top: 20px; }

        /* STORIES SECTION */
        .stories-container {
            display: flex; gap: 15px; overflow-x: auto;
            padding: 10px 0 20px; scrollbar-width: none;
        }
        .stories-container::-webkit-scrollbar { display: none; }
        .story-circle {
            min-width: 70px; height: 70px; border-radius: 50%;
            padding: 3px; background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            cursor: pointer; flex-shrink: 0;
        }
        .story-circle img {
            width: 100%; height: 100%; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--bg);
        }
        
        input, select {
            width: 100%; margin: 8px 0; padding: 14px;
            box-sizing: border-box; border-radius: 14px;
            border: 1px solid var(--glass-border); background: var(--card-bg);
            color: white; font-size: 16px;
        }

        .upload-area {
            background: var(--card-bg); padding: 20px;
            border-radius: 20px; border: 1px solid var(--glass-border);
            margin-bottom: 25px;
        }

        button {
            width: 100%; margin: 10px 0; padding: 14px;
            border-radius: 14px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-weight: 600; cursor: pointer;
        }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px 0; }

        .album-card {
            background: var(--card-bg); border: 1px solid var(--glass-border);
            border-radius: 18px; padding: 12px; position: relative;
        }

        .thumb-container {
            width: 100%; aspect-ratio: 1/1; background: #111;
            border-radius: 12px; overflow: hidden;
            display: flex; align-items: center; justify-content: center; margin-bottom: 10px;
        }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .action-btns { display: flex; gap: 8px; margin-top: 12px; }
        .action-btns button { 
            padding: 8px; margin: 0; font-size: 0.8rem; 
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
        }

        .photo-item { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 1/1; border: 1px solid var(--glass-border); }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.7); border: none; color: white; border-radius: 50%; width: 25px; height: 25px; }

        /* CALENDAR STYLE */
        .calendar-badge {
            background: var(--primary); font-size: 0.7rem; padding: 2px 8px;
            border-radius: 10px; margin-bottom: 5px; display: inline-block;
        }

        #lockScreen {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

<div id="lockScreen">
    <div style="font-size: 3rem; margin-bottom: 20px;">🔐</div>
    <h2 style="font-weight: 400;">Personal Vault</h2>
    <input id="pass" type="password" placeholder="PIN" style="width: 200px; text-align: center; letter-spacing: 5px;">
    <button onclick="unlock()" style="width: 200px;">Unlock</button>
</div>

<div class="header">
    <h1>📸 MY MEMORIES</h1>
</div>

<div class="container">
    <div id="stories" class="stories-container"></div>

    <input id="search" placeholder="🔍 Search memories..." oninput="display()">
    
    <div class="upload-area">
        <input id="albumName" placeholder="Album Name (Optional)">
        <input type="file" id="fileInput" multiple>
        <button id="uploadBtn" onclick="upload(this)">Cloud Upload</button>
    </div>

    <div style="display:flex; gap:10px; margin-bottom:10px;">
        <button onclick="currentView='grid'; display()" style="background:rgba(255,255,255,0.1)">Grid View</button>
        <button onclick="currentView='calendar'; display()" style="background:rgba(255,255,255,0.1)">Calendar View</button>
    </div>

    <div id="albums"></div>
</div>

<script>
    const PASSWORD = "1234";
    const CLOUD_NAME = "dzfssbg4j";
    const UPLOAD_PRESET = "memories_upload";

    let albums = JSON.parse(localStorage.getItem("albums")) || {};
    let currentView = 'grid';

    function save() { localStorage.setItem("albums", JSON.stringify(albums)); }

    function unlock() {
        if (document.getElementById("pass").value === PASSWORD) {
            document.getElementById("lockScreen").style.display = "none";
            display();
        } else { alert("Wrong PIN"); }
    }

    async function upload(btn) {
        const files = document.getElementById("fileInput").files;
        if (files.length === 0) return alert("Select files");

        btn.innerText = "🚀 Uploading...";
        btn.disabled = true;
        const dateStr = new Date().toLocaleDateString();

        for (let file of files) {
            let formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);

            try {
                let res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: "POST", body: formData });
                let data = await res.json();
                
                let rawUrl = data.secure_url;
                let thumbUrl = rawUrl.replace('/upload/', '/upload/w_500,h_500,c_fill,g_auto,q_auto,f_auto/');
                
                let manual = document.getElementById("albumName").value || "General";
                if (!albums[manual]) albums[manual] = { items: [] };
                
                albums[manual].items.unshift({ 
                    url: rawUrl, 
                    thumb: thumbUrl, 
                    name: file.name,
                    date: dateStr 
                });
            } catch (e) { console.error(e); }
        }

        save();
        display();
        btn.innerText = "Cloud Upload"; btn.disabled = false;
        document.getElementById("fileInput").value = "";
    }

    function display() {
        renderStories();
        let div = document.getElementById("albums");
        let search = document.getElementById("search").value.toLowerCase();
        let html = '<div class="grid fade-in">';

        if (currentView === 'grid') {
            for (let name in albums) {
                if (!name.toLowerCase().includes(search)) continue;
                let cover = albums[name].items[0];
                html += `
                    <div class="album-card">
                        <div onclick="openAlbum('${name}')">
                            <div class="thumb-container">
                                <img src="${cover ? cover.thumb : ''}" onerror="this.src='https://placehold.co/400x400?text=Empty'">
                            </div>
                            <h3>${name}</h3>
                            <p>${albums[name].items.length} photos</p>
                        </div>
                        <div class="action-btns">
                            <button onclick="renameAlbum('${name}')">✏️</button>
                            <button onclick="deleteAlbum('${name}')">🗑️</button>
                        </div>
                    </div>`;
            }
        } else {
            // CALENDAR GROUPING
            let dateGroups = {};
            for (let name in albums) {
                albums[name].items.forEach(item => {
                    if (!dateGroups[item.date]) dateGroups[item.date] = [];
                    dateGroups[item.date].push(item);
                });
            }
            for (let date in dateGroups) {
                html += `<div style="grid-column: 1/-1"><span class="calendar-badge">${date}</span></div>`;
                dateGroups[date].forEach(item => {
                    html += `<div class="photo-item"><img src="${item.thumb}" onclick="window.open('${item.url}')"></div>`;
                });
            }
        }
        html += '</div>';
        div.innerHTML = html;
    }

    function renderStories() {
        let storyDiv = document.getElementById("stories");
        let allRecent = [];
        for (let name in albums) { allRecent.push(albums[name].items[0]); }
        
        let storyHtml = allRecent.filter(i => i).slice(0, 8).map(item => `
            <div class="story-circle" onclick="window.open('${item.url}')">
                <img src="${item.thumb}">
            </div>
        `).join('');
        storyDiv.innerHTML = storyHtml;
    }

    function openAlbum(name) {
        let div = document.getElementById("albums");
        let html = `<div class="fade-in">
            <button onclick="display()" style="width:auto; padding:10px 20px; margin-bottom:15px;">⬅ Back</button>
            <h2>${name}</h2><div class="grid">`;
        
        albums[name].items.forEach((item, i) => {
            html += `<div class="photo-item">
                <img src="${item.thumb}" onclick="window.open('${item.url}')">
                <button class="del-btn" onclick="deleteItem('${name}',${i})">×</button>
            </div>`;
        });
        html += `</div></div>`;
        div.innerHTML = html;
    }

    function renameAlbum(old) {
        let n = prompt("New name:", old);
        if (n && n !== old) { albums[n] = albums[old]; delete albums[old]; save(); display(); }
    }

    function deleteAlbum(name) {
        if (confirm("Delete entire album?")) { delete albums[name]; save(); display(); }
    }

    function deleteItem(name, i) {
        albums[name].items.splice(i, 1);
        if (albums[name].items.length === 0) delete albums[name];
        save();
        albums[name] ? openAlbum(name) : display();
    }

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
